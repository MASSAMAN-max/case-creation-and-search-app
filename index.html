<script>
// --- 通信設定 ---
const GAS_URL = 'https://script.google.com/macros/s/AKfycbya0qQ9HsAIcues8jupM700xkVG4AyOyeJMqMuBsauD0ThsAe_glb4rTyhdHjJ0ijj0Cw/exec';
const CLIENT_ID = '302132186875-fr0lh20940o7k9jrdg3drm4n5r19lm99.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/drive';

let accessToken = null;

/**
 * ページ読み込み時の処理
 */
document.addEventListener("DOMContentLoaded", () => {
  accessToken = localStorage.getItem("google_access_token");
  
  if (!accessToken) {
    document.getElementById("initLoader").innerHTML = `
      <div style="text-align:center; padding:50px;">
        <h3>案件管理アプリをご利用するにはログインが必要です</h3>
        <button onclick="handleAuthClick()" style="padding:10px 20px; font-size:16px; cursor:pointer;">Googleアカウントでログイン</button>
      </div>
    `;
    document.getElementById("mainApp").style.display = "none";
  } else {
    initializeApp();
  }
});

/**
 * Google認証画面へ飛ばす処理
 */
function handleAuthClick() {
  const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
    `client_id=${CLIENT_ID}` +
    `&redirect_uri=${window.location.origin}` + 
    `&response_type=token` +
    `&scope=${encodeURIComponent(SCOPES)}`;
  
  window.location.href = authUrl;
}

// トークン拾い上げ
if (window.location.hash) {
  const params = new URLSearchParams(window.location.hash.substring(1));
  const token = params.get("access_token");
  if (token) {
    localStorage.setItem("google_access_token", token);
    window.location.hash = ""; 
    window.location.reload();
  }
}

/**
 * アプリの初期化
 */
async function initializeApp() {
  try {
    const data = await apiCall('loadMaster');
    appConfig = data;
    const select = document.getElementById("filterClient");
    // プルダウン生成
    if (data.clientList) {
      data.clientList.forEach(c => {
        const opt = document.createElement("option");
        opt.value = opt.textContent = c;
        select.appendChild(opt);
      });
    }
    document.getElementById("initLoader").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
  } catch (e) {
    alert("初期化失敗: " + e.message);
    localStorage.removeItem("google_access_token");
    window.location.reload();
  }
}

/**
 * API通信関数（認証トークン付きに統一）
 */
async function apiCall(action, payload = {}) {
  try {
    const response = await fetch(GAS_URL, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + accessToken
      },
      body: JSON.stringify({
        action: action,
        payload: payload
      })
    });
    
    if (!response.ok) throw new Error("通信エラー");
    const res = await response.json();
    if (res.status === 'error') throw new Error(res.message);
    return res.data;
  } catch (e) {
    console.error(e);
    throw e;
  }
}

// 検索
async function search() {
  const btn = document.getElementById("searchBtn");
  const icon = document.getElementById("searchIcon");
  btn.disabled = true;
  icon.classList.add("spinning");
  
  try {
    const results = await apiCall('search', {
      client: document.getElementById("filterClient").value,
      month: document.getElementById("filterMonth").value,
      keyword: document.getElementById("searchValue").value
    });
    displayResults(results); // displayResults関数が他にある前提です
  } catch (e) {
    alert("検索失敗: " + e.message);
  } finally {
    btn.disabled = false;
    icon.classList.remove("spinning");
  }
}

// 保存
async function saveRecord(rowNumber, btnEl) {
  const originalHtml = btnEl.innerHTML;
  btnEl.disabled = true;
  btnEl.innerHTML = '保存中...';

  const formData = {};
  ["工事内容1","工事内容2","工事内容3","工事内容4","施工日1","施工日2","施工日3","施工日4","検査日","備考"].forEach(f => {
    const el = document.getElementById(`${f}_${rowNumber}`);
    if (el) formData[f] = el.value;
  });

  try {
    const msg = await apiCall('update', { rowNumber, formData });
    alert(msg);
  } catch (e) {
    alert("保存失敗: " + e.message);
  } finally {
    btnEl.disabled = false;
    btnEl.innerHTML = originalHtml;
  }
}

// アップロード
async function handleUpload(rowNumber, btn) {
  const files = selectedFilesMap[rowNumber];
  if (!files || files.length === 0) return alert("ファイルを選択してください");

  btn.disabled = true;
  const status = document.getElementById(`status_${rowNumber}`);
  status.textContent = "変換中...";

  try {
    const filesData = await Promise.all(files.map(file => {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = e => resolve({ data: e.target.result, mimeType: file.type, name: file.name });
        reader.readAsDataURL(file);
      });
    }));

    status.textContent = "アップロード中...";
    const msg = await apiCall('upload', {
      rowNumber,
      uploader: document.getElementById(`uploader_${rowNumber}`).value,
      fileType: document.getElementById(`fileType_${rowNumber}`).value,
      files: filesData
    });
    
    status.textContent = "✅ " + msg;
    if (typeof clearFiles === 'function') clearFiles(rowNumber);
  } catch (e) {
    status.textContent = "❌ 失敗: " + e.message;
  } finally {
    btn.disabled = false;
  }
}
</script>
