<!DOCTYPE html>
<html lang="ja">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>案件管理アプリ</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
        #initLoader { display: flex; justify-content: center; align-items: center; min-height: 200px; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .login-box { text-align: center; padding: 50px; }
        button { padding: 10px 20px; cursor: pointer; background: #4285f4; color: white; border: none; border-radius: 4px; }
        button:disabled { background: #ccc; }
        .filter-sec { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="initLoader">読み込み中...</div>

    <div id="mainApp" style="display:none;" class="container">
        <h2>案件管理システム</h2>
        <div class="filter-sec">
            <select id="filterClient"><option value="">すべての発注元</option></select>
            <input type="number" id="filterMonth" placeholder="月（1-12）" min="1" max="12">
            <input type="text" id="searchValue" placeholder="キーワード検索">
            <button id="searchBtn" onclick="search()">検索</button>
        </div>
        <div id="resultTable">ここに検索結果が表示されます</div>
    </div>

    <script>
    // --- 通信設定（ご自身のものに書き換えてください） ---
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbw17-nkHnUfe0KYq3VSDG60N_3y-hG7b-soGOfNGnN-ZkqLrHTJ9WsOqlJO3KeUmYKjBA/exec';
    const CLIENT_ID = '302132186875-fr0lh20940o7k9jrdg3drm4n5r19lm99.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/drive';

    let accessToken = null;
    let appConfig = {};
    // 1. 起動時の処理
    // 1. 起動時の処理
    document.addEventListener("DOMContentLoaded", () => {
        accessToken = localStorage.getItem("google_access_token");
        
        if (!accessToken) {
            showLoginScreen();
        } else {
            initializeApp();
        }
    });

    // 2. ログイン画面の表示
    function showLoginScreen() {
        document.getElementById("initLoader").innerHTML = `
            <div class="login-box">
                <h3>案件管理アプリをご利用するにはログインが必要です</h3>
                <button onclick="handleAuthClick()">Googleアカウントでログイン</button>
            </div>
        `;
    }

    // 3. Google認証
    function handleAuthClick() {
      // ⚠️ Vercelの「本番用URL（絶対に変わらない方）」を直接ここに手書きで固定します！
      // ※末尾のスラッシュ「なし」にしてください。
      const PROD_URL = 'https://my-first-app-rho-nine.vercel.app'; 
    
      const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
        `client_id=${CLIENT_ID}` +
        `&redirect_uri=${encodeURIComponent(PROD_URL)}` + // 固定したURLを送る
        `&response_type=token` +
        `&scope=${encodeURIComponent(SCOPES)}`;
      
      window.location.href = authUrl;
    }

    // 4. URLからのトークン取得
    if (window.location.hash) {
        const params = new URLSearchParams(window.location.hash.substring(1));
        const token = params.get("access_token");
        if (token) {
            localStorage.setItem("google_access_token", token);
            window.location.hash = ""; 
            window.location.reload();
        }
    }

    // 5. アプリ初期化（マスター取得）
    async function initializeApp() {
        try {
            const data = await apiCall('loadMaster');
            appConfig = data;
            const select = document.getElementById("filterClient");
            if (data.clientList) {
                data.clientList.forEach(c => {
                    const opt = document.createElement("option");
                    opt.value = opt.textContent = c;
                    select.appendChild(opt);
                });
            }
            document.getElementById("initLoader").style.display = "none";
            document.getElementById("mainApp").style.display = "block";
        } catch (e) {
            console.error(e);
            alert("初期化失敗: " + e.message);
            localStorage.removeItem("google_access_token");
            showLoginScreen();
        }
    }

    // 6. 通信関数
    async function apiCall(action, payload = {}) {
      // ログイン時に取得した認証トークン
      const token = localStorage.getItem('google_access_token'); 
      
      // 💡 トークンはヘッダーではなく、データ（payload）の中に混ぜる！
      payload.token = token;
    
      const requestBody = {
        action: action,
        payload: payload
      };
    
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: {
            // 💡 ヘッダーはこれだけにします。Authorizationは絶対に書かないでください！
            'Content-Type': 'text/plain' 
          },
          body: JSON.stringify(requestBody)
        });
    
        if (!response.ok) {
          throw new Error(`ネットワークエラー: ${response.status}`);
        }
    
        const result = await response.json();
        
        if (result.status === 'error') {
          throw new Error(result.message);
        }
    
        return result.data;
    
      } catch (error) {
        console.error('通信失敗:', error);
        throw error;
      }
    }
    // 7. 検索処理
    async function search() {
        const btn = document.getElementById("searchBtn");
        btn.disabled = true;
        btn.textContent = "検索中...";
        try {
            const results = await apiCall('search', {
                client: document.getElementById("filterClient").value,
                month: document.getElementById("filterMonth").value,
                keyword: document.getElementById("searchValue").value
            });
            // 簡易表示（テーブル作成処理などは別途必要）
            document.getElementById("resultTable").innerHTML = `<p>${results.length} 件見つかりました</p>`;
            console.log(results);
        } catch (e) {
            alert("検索失敗: " + e.message);
        } finally {
            btn.disabled = false;
            btn.textContent = "検索";
        }
    }
    </script>
</body>
</html>
