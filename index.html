<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f1f5f9;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-sub: #64748b;
      --border: #e2e8f0;
      --accent: #3b82f6;
      --folder-bg: #eff6ff;
      --folder-text: #1d4ed8;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 16px;
      line-height: 1.6;
    }

    /* ヘッダー・タイトル */
    .app-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      color: var(--text-main);
    }
    .app-header h2 { margin: 0; font-size: 1.25rem; font-weight: 800; }

    /* 検索パネル */
    .search-card {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05);
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    @media (min-width: 768px) {
      .filter-grid { grid-template-columns: 1fr 1fr 2fr; }
    }

    label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-sub);
      display: block;
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      transition: all 0.2s;
      box-sizing: border-box;
      color: var(--text-main);
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    /* ボタンデザイン */
    .btn {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
    }
    .btn-primary {
      background: var(--primary);
      color: white;
      width: 100%;
    }
    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
    }
    .btn-primary:active { transform: translateY(0); }
    
    .btn-secondary {
      background: #f1f5f9;
      color: var(--text-sub);
      border: 1px solid var(--border);
    }

    /* くるくる */
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .spinning { animation: spin 1s linear infinite; display: inline-block; }

    /* 結果リスト */
    .result-item {
      background: var(--card-bg);
      border-radius: 14px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
    }
    .result-item:hover {
      border-color: var(--accent);
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
    }

    .result-summary {
      padding: 16px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .summary-info { flex: 1; }
    .row-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .badge-no { font-size: 10px; font-weight: 800; background: #f1f5f9; color: var(--text-sub); padding: 2px 8px; border-radius: 5px; }
    .anken-title { font-weight: 700; font-size: 16px; color: var(--text-main); display: block; }
    .summary-subtext { font-size: 13px; color: var(--text-sub); margin-top: 4px; display: flex; gap: 12px; }

    /* 詳細エリア */
    .result-details {
      display: none;
      padding: 0 20px 24px 20px;
      background: #fff;
    }
    .is-open { border-left: 4px solid var(--primary); }
    .is-open .result-details { display: block; }
    .is-open .expand-icon { transform: rotate(180deg); color: var(--primary); }

    /* クラウドフォルダ風デザイン */
    .folder-container {
      display: flex;
      align-items: center;
      background: var(--folder-bg);
      border-radius: 12px;
      padding: 12px 16px;
      margin: 10px 0 20px 0;
      border: 1px solid #dbeafe;
    }
    .folder-info { flex: 1; display: flex; align-items: center; gap: 10px; }
    .folder-icon { color: #3b82f6; font-size: 32px; }
    .folder-label { font-size: 13px; font-weight: 700; color: var(--folder-text); }
    .btn-folder {
      background: #fff;
      color: var(--folder-text);
      border: 1px solid #bfdbfe;
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .btn-folder:hover { background: var(--folder-text); color: #fff; }

    /* クラウド風アップロードエリア */
    .upload-box {
      margin-top: 24px;
      padding: 20px;
      background: #fafafa;
      border: 2px dashed var(--border);
      border-radius: 12px;
      text-align: center;
      transition: all 0.2s;
    }
    .upload-box.dragover {
      border-color: var(--primary);
      background: rgba(37, 99, 235, 0.05);
    }
    .drop-zone-text {
      color: var(--text-sub);
      font-size: 14px;
      margin-bottom: 10px;
    }
    .file-list {
      text-align: left;
      margin: 15px 0;
      font-size: 13px;
      min-height: 20px;
      padding: 10px;
      background: #f1f5f9 !important;
      border-radius: 8px;
    }
    .file-item {
      display: flex !important;
      align-items: center;
      background: white !important;
      color: #0f172a !important;
      padding: 8px;
      margin-bottom: 5px;
      border: 1px solid #cbd5e1;
    }
    .upload-footer {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
    }
    @media (max-width: 600px) {
      .pc-only { display: none; }
    }

    /* 詳細内部のグリッド */
    .detail-card {
      background: #f8fafc;
      border-radius: 12px;
      padding: 16px;
      margin: 10px 0 20px 0;
      font-size: 14px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 600px) { .detail-card { grid-template-columns: 1fr 1fr; } }
    
    .data-row { display: flex; flex-direction: column; }
    .data-label { font-size: 11px; color: var(--text-sub); font-weight: bold; }
    .data-value { font-weight: 500; }

    .work-section {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px dashed var(--border);
    }
    .work-section:last-child { border-bottom: none; }

    .upload-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    #searchCount { font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 12px; }

    .input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .input-row label {
      flex: 0 0 70px;
      margin-bottom: 0;
    }
    .input-row select {
      flex: 1;
    }
  </style>
</head>
<body>
  <div id="loginScreen" style="display: none; min-height: 100vh; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); display: flex; align-items: center; justify-content: center; font-family: 'Helvetica Neue', Arial, sans-serif;">
    <div style="background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; box-sizing: border-box;">
      <h2 style="margin: 0 0 8px 0; color: #333; font-size: 24px; font-weight: 600; text-align: center;">案件管理システム</h2>
      <p style="margin: 0 0 24px 0; color: #666; font-size: 14px; text-align: center;">IDとパスワードを入力してログインしてください</p>
      
      <div style="margin-bottom: 16px;">
        <label style="display: block; margin-bottom: 6px; color: #555; font-size: 14px; font-weight: 500;">ログインID</label>
        <input type="text" id="loginIdInput" placeholder="example@gmail.com" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='#4a90e2'" onblur="this.style.borderColor='#ddd'">
      </div>
      
      <div style="margin-bottom: 24px;">
        <label style="display: block; margin-bottom: 6px; color: #555; font-size: 14px; font-weight: 500;">パスワード</label>
        <div style="position: relative; width: 100%;">
          <input type="password" id="loginPasswordInput" placeholder="••••••••" style="width: 100%; padding: 12px 45px 12px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; transition: border-color 0.2s;" onfocus="this.style.borderColor='#4a90e2'" onblur="this.style.borderColor='#ddd'">
          <button type="button" onclick="togglePasswordVisibility()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #999; display: flex; align-items: center; justify-content: center; padding: 0; outline: none;">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width: 20px; height: 20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
            </svg>
          </button>
        </div>
      </div>
      
      <button id="loginBtn" onclick="handleLoginSubmit()" style="width: 100%; padding: 12px; background: #4a90e2; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; box-shadow: 0 4px 6px rgba(74,144,226,0.2);" onmouseover="this.style.background='#357abd'" onmouseout="this.style.background='#4a90e2'">
        ログイン
      </button>
    </div>
  </div>

  <div id="initLoader" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: #ffffff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Helvetica Neue', Arial, sans-serif;">
    <div style="width: 100%; max-width: 320px; text-align: center;">
      <div style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 24px; height: 40px;">
        <div class="gemini-bar" style="width: 6px; height: 16px; background: linear-gradient(to bottom, #4a90e2, #9b59b6); border-radius: 4px; animation: geminiWave 1.2s ease-in-out infinite;"></div>
        <div class="gemini-bar" style="width: 6px; height: 32px; background: linear-gradient(to bottom, #7bb0f9, #bdc3c7); border-radius: 4px; animation: geminiWave 1.2s ease-in-out infinite; animation-delay: 0.15s;"></div>
        <div class="gemini-bar" style="width: 6px; height: 48px; background: linear-gradient(to bottom, #4a90e2, #4facfe); border-radius: 4px; animation: geminiWave 1.2s ease-in-out infinite; animation-delay: 0.3s;"></div>
        <div class="gemini-bar" style="width: 6px; height: 24px; background: linear-gradient(to bottom, #9b59b6, #ff0844); border-radius: 4px; animation: geminiWave 1.2s ease-in-out infinite; animation-delay: 0.45s;"></div>
      </div>
      <p id="loaderText" style="margin: 0; color: #555; font-size: 15px; font-weight: 500; letter-spacing: 0.5px; animation: pulseText 2s ease-in-out infinite;">
        ログイン認証中 & データを読み込み中...
      </p>
    </div>
  </div>

  <style>
    @keyframes geminiWave {
      0%, 100% { transform: scaleY(0.3); opacity: 0.6; }
      50% { transform: scaleY(1); opacity: 1; filter: drop-shadow(0 0 4px rgba(74,144,226,0.5)); }
    }
    @keyframes pulseText {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>

  <div id="mainApp" style="display:none;">
    
  <div class="app-header">
    <span class="material-symbols-outlined" style="color:var(--primary); font-size:32px;">domain</span>
    <h2>案件管理ダッシュボード</h2>
  </div>
  
  <div class="search-card">
    <div class="filter-grid">
      <div>
        <label>発注元（クライアント）</label>
        <select id="filterClient"><option value="">すべての発注元</option></select>
      </div>
      <div>
        <label>施工予定月</label>
        <select id="filterMonth">
          <option value="">全期間</option>
          <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
          <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
          <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
          <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
        </select>
      </div>
      <div>
        <label>フリーワード検索</label>
        <input type="text" id="searchValue" placeholder="案件名、No、住所で絞り込み...">
      </div>
    </div>
    <button onclick="search()" id="searchBtn" class="btn btn-primary">
      <span id="searchIcon" class="material-symbols-outlined" style="font-size:20px;">search</span> 案件を検索する
    </button>
  </div>

  <div id="searchCount"></div>
  <div id="results"></div>
</div>

<script>
// 🛠️ 【重要】ここにご自身のID情報を正しく設定してください
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw17-nkHnUfe0KYq3VSDG60N_3y-hG7b-soGOfNGnN-ZkqLrHTJ9WsOqlJO3KeUmYKjBA/exec';
const CLIENT_ID = '302132186875-fr0lh20940o7k9jrdg3drm4n5r19lm99.apps.googleusercontent.com';

const SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/drive';

let appConfig = {};
const selectedFilesMap = {};

// vercel固定URL
const REDIRECT_URI = "my-first-app-atago-bfe9dq5s3rmsl-nine02yhkkm17ahmhLo.vercel.app";

function getHashParams() {
  const hash = window.location.hash.substring(1);
  const params = {};
  if (!hash) return params;
  hash.split('&').forEach(pair => {
    const [key, val] = pair.split('=');
    params[key] = decodeURIComponent(val);
  });
  return params;
}

function redirectToLogin() {
  const authUrl = `https://accounts.google.com/o/oauth2/v2/auth?` +
    `client_id=${encodeURIComponent(CLIENT_ID)}` +
    `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
    `&response_type=token` +
    `&scope=${encodeURIComponent(SCOPES)}` +
    `&prompt=consent`;
  window.location.href = authUrl;
}

// Vercel用の共通API通信関数
async function apiCall(action, payload = {}) {
  const token = localStorage.getItem('google_access_token');
  if (!token) {
    alert("セッションが切れたため、再ログインします。");
    redirectToLogin();
    return;
  }
  
  payload.token = token;

  const requestBody = {
    action: action,
    payload: payload
  };

  const response = await fetch(GAS_URL, {
    method: 'POST',
    headers: {
      'Content-Type': 'text/plain'
    },
    body: JSON.stringify(requestBody)
  });

  if (!response.ok) throw new Error(`HTTPエラー! ステータス: ${response.status}`);
  
  const result = await response.json();
  
  // 🚨 GASのエラー判定構造に合わせて修正
  if (result.status === 'error') {
    throw new Error(result.message);
  }
  
  // 💡 GASが包んでくれている「data」の包み紙を剥がして、中身だけを返却します！
  return result.data; 
}
// 画面起動時の初期化ロジック（ID・パスワード認証版）
// 画面起動時の初期化ロジック
document.addEventListener("DOMContentLoaded", async () => {
  // 💡 元の変数名「GAS_URL」が定義されているかチェック
  if (typeof GAS_URL === 'undefined' || !GAS_URL) {
    alert("⚠️ 設定エラー\n\nJavaScript内で「GAS_URL」が定義されていません。\nURLを定義している行が消えていないか確認してください。");
    return;
  }

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("initLoader").style.display = "none";
  document.getElementById("mainApp").style.display = "none";

  const savedId = localStorage.getItem('app_login_id');
  const savedPassword = localStorage.getItem('app_login_password');
  
  if (savedId && savedPassword) {
    initializeApp(savedId, savedPassword);
  } else {
    document.getElementById("loginScreen").style.display = "flex";
    
    const enterContainer = (e) => { if (e.key === "Enter") handleLoginSubmit(); };
    document.getElementById("loginIdInput").addEventListener("keypress", enterContainer);
    document.getElementById("loginPasswordInput").addEventListener("keypress", enterContainer);
  }
});

/**
 * パスワードの「見える／見えない」を切り替える関数
 */
function togglePasswordVisibility() {
  const passInput = document.getElementById("loginPasswordInput");
  const eyeIcon = document.getElementById("eyeIcon");
  
  if (passInput.type === "password") {
    passInput.type = "text";
    eyeIcon.innerHTML = `
      <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.822 7.822 3 3m-3-3a9.675 9.675 0 0 1-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
    `;
  } else {
    passInput.type = "password";
    eyeIcon.innerHTML = `
      <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
    `;
  }
}

/**
 * ログインボタンが押された時の処理
 */
async function handleLoginSubmit() {
  const idInput = document.getElementById("loginIdInput").value.trim();
  const passwordInput = document.getElementById("loginPasswordInput").value.trim();
  
  if (!idInput || !passwordInput) {
    alert("IDとパスワードの両方を入力してください。");
    return;
  }
  
  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.textContent = "認証中...";
  
  localStorage.setItem('app_login_id', idInput);
  localStorage.setItem('app_login_password', passwordInput);
  
  document.getElementById("loginScreen").style.display = "none";
  await initializeApp(idInput, passwordInput);
}

/**
 * アプリのデータを読み込んで起動する共通関数
 */
async function initializeApp(loginId, password) {
  const loader = document.getElementById("initLoader");
  loader.style.display = "block";
  document.getElementById("loaderText").textContent = "ログイン認証中 & データを読み込み中...";

  try {
    const data = await apiCall("loadAppDataMaster");
    
    if (!data || typeof data !== 'object') {
      throw new Error("GASからのデータが正しくありません。");
    }

    appConfig = data;
    const select = document.getElementById("filterClient");
    select.innerHTML = '<option value="">すべて</option>'; 
    data.clientList.forEach(c => {
      const opt = document.createElement("option");
      opt.value = opt.textContent = c;
      select.appendChild(opt);
    });
    
    loader.style.display = "none";
    document.getElementById("mainApp").style.display = "block";
  } catch (err) {
    console.error(err);
    alert("ログインに失敗しました。\n\n理由: " + err.message);
    
    localStorage.removeItem('app_login_id');
    localStorage.removeItem('app_login_password');
    
    const btn = document.getElementById("loginBtn");
    if (btn) {
      btn.disabled = false;
      btn.textContent = "ログイン";
    }
    
    loader.style.display = "none";
    document.getElementById("loginScreen").style.display = "flex";
  }
}

/**
 * 常にログイン情報を自動添付して通信する関数（💡 GAS_URL に修正）
 */
async function apiCall(action, payload = {}) {
  const loginId = localStorage.getItem('app_login_id');
  const password = localStorage.getItem('app_login_password');
  
  payload.loginId = loginId;
  payload.password = password;

  // 💡 ここを元の変数名「GAS_URL」に戻しました！
  const response = await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify({ action: action, payload: payload })
  });
  const resData = await response.json();
  if (resData.status === "error") {
    throw new Error(resData.message);
  }
  return resData.data;
}
  
// 検索実行
async function search() {
  const btn = document.getElementById("searchBtn");
  const icon = document.getElementById("searchIcon");
  const resultsDiv = document.getElementById("results");
  
  btn.disabled = true;
  icon.textContent = "autorenew";
  icon.classList.add("spinning");
  resultsDiv.style.opacity = "0.5";

  const client = document.getElementById("filterClient").value;
  const month = document.getElementById("filterMonth").value;
  
  // 💡 入力された文字の全角英数字・大文字をきれいに変換してGASへ送る
  let keyword = document.getElementById("searchValue").value;
  if (keyword) {
    keyword = keyword.replace(/[！-～]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).toLowerCase().trim();
  }

  try {
    const records = await apiCall("searchRecordsExtended", {
      client: client,
      month: month,
      keyword: keyword
    });
    btn.disabled = false;
    icon.textContent = "search";
    icon.classList.remove("spinning");
    resultsDiv.style.opacity = "1";
    displayResults(records);
  } catch (err) {
    btn.disabled = false;
    icon.textContent = "search";
    icon.classList.remove("spinning");
    resultsDiv.style.opacity = "1";
    resultsDiv.innerHTML = '<p style="color:red; text-align:center;">エラー: ' + err.message + '</p>';
  }
}

// 結果表示
function displayResults(records) {
  const container = document.getElementById("results");
  const countDiv = document.getElementById("searchCount");
  container.innerHTML = "";
  
  if (!records || records.length === 0) {
    countDiv.innerHTML = "条件に一致する案件は見つかりませんでした。";
    return;
  }
  countDiv.innerHTML = `<span style="color:var(--primary)">${records.length}</span> 件の案件を表示中`;

  records.forEach(record => {
    const item = document.createElement("div");
    item.className = "result-item";
    
    const parseDate = (d) => (d && /^\d{4}-\d{2}-\d{2}$/.test(d)) ? d : "";
    const displayDate = (record.施工日1 && /^\d{4}-\d{2}-\d{2}$/.test(record.施工日1)) 
                        ? record.施工日1.replace(/-/g, '/') 
                        : (record.施工日1 || "未定");

    item.innerHTML = `
      <div class="result-summary" onclick="this.parentElement.classList.toggle('is-open')">
        <div class="summary-info">
          <div class="row-meta">
            <span class="badge-no">No.${record.No}</span>
            <span style="font-size:12px; color:var(--text-sub);">${record.発注元}</span>
          </div>
          <span class="anken-title">${record.案件名}</span>
          <div class="summary-subtext">
            <span style="display:flex; align-items:center; gap:4px;"><span class="material-symbols-outlined" style="font-size:16px;">calendar_month</span> ${displayDate}</span>
            <span style="display:flex; align-items:center; gap:4px;"><span class="material-symbols-outlined" style="font-size:16px;">construction</span> ${record.工事内容1 || "---"}</span>
          </div>
        </div>
        <span class="material-symbols-outlined expand-icon" style="transition: transform 0.3s; color:var(--text-sub)">expand_more</span>
      </div>
      
      <div class="result-details">
        ${record.添付資料 ? `
        <div class="folder-container">
          <div class="folder-info">
            <span class="material-symbols-outlined folder-icon">cloud_done</span>
            <div>
              <div class="folder-label">共有資料フォルダ</div>
              <div style="font-size:11px; color:var(--text-sub)">図面・写真・報告書</div>
            </div>
          </div>
          <a href="${record.添付資料}" target="_blank" class="btn-folder">
            <span class="material-symbols-outlined" style="font-size:18px;">open_in_new</span> 開く
          </a>
        </div>
        ` : `<div style="padding:16px; font-size:12px; color:var(--text-sub);">共有資料フォルダ：未作成</div>`}

        <div class="detail-card">
          <div class="data-row"><span class="data-label">所在地</span><span class="data-value">${record.住所 || "---"}</span></div>
          <div class="data-row"><span class="data-label">面積</span><span class="data-value">${record.専有面積 || "---"}</span></div>
          <div class="data-row" style="grid-column: span 2;"><span class="data-label">担当者 / 連絡先</span><span class="data-value">${record.担当者 || ""} / ${record.連絡先 || ""}</span></div>
        </div>

        <div style="margin-bottom:15px;">
          <label>📝 備考メモ</label>
          <textarea id="備考_${record.rowNumber}" rows="2" placeholder="特記情報を入力">${record.備考 || ""}</textarea>
        </div>

        <div style="margin-bottom:15px;">
          <label>🔍 検査予定日時</label>
          <input type="datetime-local" id="検査日_${record.rowNumber}" value="${record.検査日 || ''}">
        </div>

        <div id="workFields_${record.rowNumber}"></div>

        <button class="btn btn-primary" onclick="saveRecord(${record.rowNumber}, this)" style="margin-top:20px;">
          <span class="material-symbols-outlined">save</span> 内容を更新して保存
        </button>

        <div class="upload-box" 
             id="dropZone_${record.rowNumber}" 
             style="cursor: pointer;"
             ondragover="event.preventDefault(); event.stopPropagation(); this.classList.add('dragover')" 
             ondragenter="event.preventDefault(); event.stopPropagation(); this.classList.add('dragover')"
             ondragleave="event.preventDefault(); event.stopPropagation(); this.classList.remove('dragover')" 
             ondrop="event.preventDefault(); event.stopPropagation(); this.classList.remove('dragover'); handleDrop(event, ${record.rowNumber})">
          
          <div class="pc-only" onclick="document.getElementById('files_${record.rowNumber}').click()">
            <span class="material-symbols-outlined" style="font-size:40px; color:var(--text-sub);">cloud_upload</span>
            <div class="drop-zone-text">ファイルをドラッグ＆ドロップ</div>
            <div style="font-size:12px; color:var(--text-sub); margin-bottom:10px;">または</div>
          </div>
          
          <button type="button" class="btn btn-secondary" onclick="document.getElementById('files_${record.rowNumber}').click()" style="margin:0 auto; padding:8px 16px; background:#fff; border:1px solid var(--border);">
            <span class="material-symbols-outlined">add_circle</span> ファイルを選択
          </button>
          
          <input type="file" id="files_${record.rowNumber}" multiple style="display:none;" onchange="handleFileSelect(this, ${record.rowNumber})">
          
          <div id="fileList_${record.rowNumber}" class="file-list"></div>

          <div class="upload-controls" style="margin-top:20px; border-top:1px solid var(--border); padding-top:15px;">
            <div class="input-row">
              <label>担当者</label>
              <select id="uploader_${record.rowNumber}">${createOptions(appConfig.uploaders)}</select>
            </div>
            <div class="input-row">
              <label>種別</label>
              <select id="fileType_${record.rowNumber}">${createOptions(appConfig.fileTypes)}</select>
            </div>
          </div>

          <div class="upload-footer">
            <button type="button" class="btn btn-primary" onclick="handleUpload(${record.rowNumber}, this)">
              <span class="material-symbols-outlined">cloud_upload</span> アップロードを開始
            </button>
            <button type="button" class="btn btn-secondary" onclick="clearFiles(${record.rowNumber})" style="background:transparent; border:none; color:var(--text-sub); font-size:12px;">
              選択をすべて解除
            </button>
          </div>
          <div id="status_${record.rowNumber}" style="font-size:12px; margin-top:10px; font-weight:bold; color:var(--primary);"></div>
        </div>
      </div>
    `;
    container.appendChild(item);

    const workContainer = document.getElementById(`workFields_${record.rowNumber}`);
    for(let i=1; i<=4; i++) {
      const rawDate = record['施工日'+i];
      const dateVal = parseDate(rawDate);
      
      const div = document.createElement("div");
      div.className = "work-section";
      div.innerHTML = `
        <div>
          <label>工事内容 ${i}</label>
          <select id="工事内容${i}_${record.rowNumber}">
            ${createOptions(appConfig.workOptions, record['工事内容'+i])}
          </select>
        </div>
        <div>
          <label>施工予定日 ${i}</label>
          <input type="date" id="施工日${i}_${record.rowNumber}" value="${dateVal}">
        </div>
      `;
      workContainer.appendChild(div);
    }
  });
}

function createOptions(list, selected="") {
  if(!list) return "";
  return list.map(opt => `<option value="${opt}" ${opt==selected?'selected':''}>${opt}</option>`).join("");
}

// 保存処理
async function saveRecord(rowNumber, btnEl) {
  const originalHtml = btnEl.innerHTML;
  btnEl.disabled = true;
  btnEl.innerHTML = '<span class="material-symbols-outlined spinning">sync</span> 保存中...';
  
  const formData = { rowNumber: rowNumber };
  const fields = ["工事内容1","工事内容2","工事内容3","工事内容4","施工日1","施工日2","施工日3","施工日4","検査日","備考"];
  
  fields.forEach(f => {
    const el = document.getElementById(`${f}_${rowNumber}`);
    if (el) formData[f] = el.value;
  });

  try {
    const msg = await apiCall("updateRecord", { rowNumber: rowNumber, formData: formData });
    alert(msg);
    btnEl.disabled = false;
    btnEl.innerHTML = originalHtml;
  } catch (err) {
    alert("保存に失敗しました: " + err.message);
    btnEl.disabled = false;
    btnEl.innerHTML = originalHtml;
  }
}

// --- アップロード用ヘルパー関数群 ---

function handleFileSelect(input, rowNumber) {
  if (input.files && input.files.length > 0) {
    addFilesToList(Array.from(input.files), rowNumber);
    input.value = ""; 
  }
}

function handleDrop(event, rowNumber) {
  event.preventDefault();
  event.stopPropagation();
  const files = event.dataTransfer.files;
  if (files.length > 0) {
    addFilesToList(Array.from(files), rowNumber);
  }
}

function addFilesToList(files, rowNumber) {
  if (!selectedFilesMap[rowNumber]) selectedFilesMap[rowNumber] = [];
  files.forEach(file => {
    const isDuplicate = selectedFilesMap[rowNumber].some(f => f.name === file.name && f.size === file.size);
    if (!isDuplicate) selectedFilesMap[rowNumber].push(file);
  });
  renderFileList(rowNumber);
}

function renderFileList(rowNumber) {
  const listDiv = document.getElementById(`fileList_${rowNumber}`);
  const files = selectedFilesMap[rowNumber] || [];
  if (files.length === 0) {
    listDiv.innerHTML = "";
    return;
  }
  listDiv.innerHTML = files.map((file, index) => `
    <div class="file-item">
      <span class="material-symbols-outlined" style="font-size:18px; margin-right:8px;">description</span>
      <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${file.name}</span>
      <span class="material-symbols-outlined" style="color:#ef4444; cursor:pointer;" onclick="removeFile(${rowNumber}, ${index})">cancel</span>
    </div>
  `).join("");
}

function removeFile(rowNumber, index) {
  selectedFilesMap[rowNumber].splice(index, 1);
  renderFileList(rowNumber);
}

function clearFiles(rowNumber) {
  selectedFilesMap[rowNumber] = [];
  renderFileList(rowNumber);
  const status = document.getElementById(`status_${rowNumber}`);
  if(status) status.textContent = "";
}

// アップロード実行
async function handleUpload(rowNumber, btn) {
  const files = selectedFilesMap[rowNumber];
  const status = document.getElementById(`status_${rowNumber}`);
  const uploader = document.getElementById(`uploader_${rowNumber}`).value;
  const fileType = document.getElementById(`fileType_${rowNumber}`).value;
  
  if (!files || files.length === 0) return alert("ファイルを選択してください");
  
  btn.disabled = true;
  const originalHtml = btn.innerHTML;
  btn.innerHTML = '<span class="material-symbols-outlined spinning">sync</span> アップロード中...';
  status.textContent = "ファイルを読み込み中...";
  
  const filesData = [];
  for (const file of files) {
    const reader = new FileReader();
    const res = await new Promise(r => {
      reader.onload = e => r({data: e.target.result, mimeType: file.type, name: file.name});
      reader.readAsDataURL(file);
    });
    filesData.push(res);
  }
  
  try {
    const msg = await apiCall("uploadFiles", {
      rowNumber: rowNumber,
      uploader: uploader,
      fileType: fileType,
      filesData: filesData
    });
    status.textContent = "✅ " + msg;
    btn.disabled = false;
    btn.innerHTML = originalHtml;
    clearFiles(rowNumber);
  } catch (err) {
    status.textContent = "❌ エラー: " + err.message;
    btn.disabled = false;
    btn.innerHTML = originalHtml;
  }
}
  
// 💡 フリーワード入力欄でEnterキーが押されたら検索を実行する
document.getElementById("searchValue").addEventListener("keypress", (e) => {
  if (e.key === "Enter") {
    e.preventDefault(); // 画面全体の予期せぬリロードを防ぐ
    search();
  }
});
</script>
